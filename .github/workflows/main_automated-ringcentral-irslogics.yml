name: Build and deploy Python app to Azure Web App - automated-ringcentral-irslogics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "venv/*"


      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Required for requesting the JWT
      contents: read # Required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C7BB3F0429AC405386EB9EBDD13BAF5B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A4A82414C3834289831D34A30842945F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_72136D5926B3459EB8721647AF9D6025 }}
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'automated-ringcentral-irslogics'
          slot-name: 'Production'
          startup-command: 'uvicorn server:app --host 0.0.0.0 --port 8000'

        env:
          RINGCENTRAL_CLIENT_ID: ${{ secrets.RINGCENTRAL_CLIENT_ID }}
          RINGCENTRAL_CLIENT_SECRET: ${{ secrets.RINGCENTRAL_CLIENT_SECRET }}
          RINGCENTRAL_REDIRECT_URI: ${{ secrets.RINGCENTRAL_REDIRECT_URI }}
          RINGCENTRAL_REFRESH_TOKEN: ${{ secrets.RINGCENTRAL_REFRESH_TOKEN }}
          IRSLOGICS_API_KEY: ${{ secrets.IRSLOGICS_API_KEY }}
